version: "3.9"

services:
  # ──────────────────────────────────────────────
  # PostgreSQL — Metadata + FTS + Audit
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: securesource-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-securesource}
      POSTGRES_USER: ${POSTGRES_USER:-securesource}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-securesource}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Qdrant — Vector Store
  # ──────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.7
    container_name: securesource-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Backend — FastAPI
  # ──────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: securesource-backend
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      QDRANT_HOST: qdrant
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./backend:/app/backend
      - ./sample_data:/app/sample_data
      - model_cache:/root/.cache
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Frontend — Next.js
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: securesource-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${APP_PORT:-8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  model_cache:
